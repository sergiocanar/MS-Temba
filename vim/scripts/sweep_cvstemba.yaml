# sweep_cvstemba.yaml
#
# Weights & Biases hyperparameter sweep for CVSTemba.
# Optimises val/mAP using Bayesian search.
#
# Usage:
#   cd vim/
#   wandb sweep scripts/sweep_cvstemba.yaml          # prints SWEEP_ID
#   wandb agent <entity>/<project>/<SWEEP_ID>        # launch one agent
#
# To run multiple parallel agents (e.g. on different GPUs):
#   CUDA_VISIBLE_DEVICES=0 wandb agent <SWEEP_ID> &
#   CUDA_VISIBLE_DEVICES=1 wandb agent <SWEEP_ID> &

program: CVSTemba_main.py

method: bayes

metric:
  name: val/mAP
  goal: maximize

# Early termination: stop runs that are clearly under-performing
early_terminate:
  type: hyperband
  min_iter: 5      # don't kill before epoch 5
  eta: 2

parameters:

  # --- window size (key architectural choice) ---
  num_clips:
    values: [15, 20, 30, 45, 60]

  # --- optimiser ---
  lr:
    distribution: log_uniform_values
    min: 1.0e-5
    max: 1.0e-3

  weight_decay:
    values: [0.001, 0.01, 0.05, 0.1]

  # --- schedule ---
  warmup_epochs:
    values: [3, 5, 10]

  min_lr:
    values: [1.0e-6, 1.0e-5, 1.0e-4]

  # --- regularisation ---
  drop_path:
    values: [0.0, 0.1, 0.2]

  # --- loss weights ---
  alpha_l:
    values: [0.5, 1.0, 2.0]

  # --- batch size ---
  batch_size:
    values: [4, 8, 16]

# Fixed args passed to every run (not swept)
command:
  - ${env}
  - python
  - ${program}
  - --cvs_root
  - /home/scanar/endovis/Datasets/SAGES_2024
  - --output_dir
  - /outputs/cvs_sweep
  - --gpu
  - "0"
  - --epochs
  - "30"
  - --wandb_project
  - cvstemba
  - ${args}
